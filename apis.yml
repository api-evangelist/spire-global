aid: spire-global
name: Spire Global
description: >-
  Spire Global operates a constellation of more than 100 LEMUR nanosatellites
  collecting maritime AIS, aviation ADS-B, GNSS-RO weather profiles, and RF
  geolocation data, and offers Space Services for hosted payloads and managed
  satellite missions. Its data products are exposed as developer-friendly
  APIs: Spire Maritime 2.0 (now operated by Kpler) delivers vessel-tracking
  AIS through a GraphQL endpoint; Spire Aviation publishes REST APIs and
  real-time streams for flight metadata, live ADS-B tracking, historic
  positions, and event feeds; Spire Weather and Climate provides RESTful
  weather and ocean data APIs including 30 years of maritime weather history;
  and Spire Space Services exposes a developer portal for managed satellite
  operations. Spire's APIs are documented at product-specific subdomains and
  authenticated with API keys.
type: Index
position: Provider
access: 3rd-Party
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
